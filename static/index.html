<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI OCR Text Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-zone svg {
            width: 4rem;
            height: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        #file-input {
            display: none;
        }

        #preview-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 0.5rem;
            display: none;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .result-group {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .content-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .summary-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(99, 102, 241, 0.1));
            border-left: 4px solid var(--accent);
            font-style: italic;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>AI Text Extractor</h1>
        <p style="color: var(--text-muted)">이미지 속 텍스트를 인식하고 스마트하게 요약합니다.</p>
    </header>

    <div class="container">
        <!-- 업로드 섹션 -->
        <div class="card">
            <h2 style="margin-bottom: 1.5rem">이미지 업로드</h2>
            <div class="upload-zone" id="drop-zone">
                <div class="loading-overlay" id="loading">
                    <div class="spinner"></div>
                </div>
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                <p id="upload-status">파일을 드래그하거나 클릭하여 선택하세요</p>
                <img id="preview-img" alt="미리보기">
            </div>
            <input type="file" id="file-input" accept="image/*">
            <button class="btn" id="extract-btn" disabled>텍스트 추출하기</button>
        </div>

        <!-- 결과 섹션 -->
        <div class="card results-section">
            <h2 style="margin-bottom: 0.5rem">인식 결과</h2>
            
            <div class="result-group">
                <span class="label">✨ 스마트 요약</span>
                <div class="content-box summary-box" id="res-summary">분석 전입니다.</div>
            </div>

            <div class="result-group">
                <span class="label">📄 전체 텍스트</span>
                <div class="content-box" id="res-full">이미지를 업로드하고 추출 버튼을 눌러주세요.</div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 OCR API Server | Designed for Premium Experience
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const extractBtn = document.getElementById('extract-btn');
        const loading = document.getElementById('loading');
        const resFull = document.getElementById('res-full');
        const resSummary = document.getElementById('res-summary');
        const uploadStatus = document.getElementById('upload-status');

        let selectedFile = null;

        // 클릭 시 선택
        dropZone.onclick = () => fileInput.click();

        // 드래그 앤 드롭
        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        };

        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                uploadStatus.style.display = 'none';
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    extractBtn.disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        extractBtn.onclick = async () => {
            if (!selectedFile) return;

            loading.style.display = 'flex';
            extractBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/ocr/extract', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    resFull.textContent = data.full_text || "텍스트를 찾을 수 없습니다.";
                    resSummary.textContent = data.summary || "요약할 내용이 없습니다.";
                } else {
                    alert('오류 발생: ' + (data.detail || data.error));
                }
            } catch (error) {
                console.error(error);
                alert('서버와 통신하는 중 오류가 발생했습니다.');
            } finally {
                loading.style.display = 'none';
                extractBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
