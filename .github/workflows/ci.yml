name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때 실행
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Docker Hub ID를 여기에 직접 넣거나, 다른 secret을 사용할 수 있습니다.
          # `${{ secrets.DOCKERHUB_USERNAME }}/ocr-api:latest` 같이 태그를 지정합니다.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ocr-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ocr-api:${{ github.sha }}
          # 빌드 캐시를 활용하여 속도 향상
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Self-hosted Runner
    needs: build-and-push
    runs-on: self-hosted  # 사용자의 컴퓨터(Self-hosted Runner)에서 실행

    steps:
      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ocr-api:latest

      - name: Stop and Remove Existing Container
        run: |
          # 1. 8000번 포트를 점유하고 있는 모든 컨테이너 ID 찾기
          CONTAINER_IDS=$(docker ps -q --filter "publish=8000")
          
          if [ ! -z "$CONTAINER_IDS" ]; then
            echo "Port 8000 is occupied by container(s): $CONTAINER_IDS. Stopping..."
            docker stop $CONTAINER_IDS || true
            docker rm $CONTAINER_IDS || true
          fi

          # 2. 이름기반으로도 추가 확인 (혹시 모르니)
          docker stop ocr-api || true
          docker rm ocr-api || true

      - name: Run New Container
        run: |
          docker run -d \
            --name ocr-api \
            -p 8000:8000 \
            --restart always \
            ${{ secrets.DOCKERHUB_USERNAME }}/ocr-api:latest
